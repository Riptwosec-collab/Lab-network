name: Bootstrap NetLab Studio

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download project archive
        run: curl -fL --retry 3 'https://drive.google.com/uc?export=download&id=1XRuDbxanJy6pM_JyqJQBMOMOFAC85W6Z' -o /tmp/netlab.zip
      - name: Extract project
        run: |
          mkdir -p /tmp/netlab
          unzip -q /tmp/netlab.zip -d /tmp/netlab
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/netlab/netlab-studio/. .
          rm -rf .github/workflows/bootstrap.yml
      - name: Commit source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add NetLab Studio foundation'
          git push origin main
